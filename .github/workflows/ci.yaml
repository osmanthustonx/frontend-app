name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
      - run: npm test

  spec-readonly-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check openspec/specs/ is not modified
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only -- openspec/specs/ || true)
          if [ -n "$CHANGED" ]; then
            echo "::error::openspec/specs/ is read-only. Spec changes must go through product-specs."
            echo "Modified files:"
            echo "$CHANGED"
            exit 1
          fi
          echo "openspec/specs/ integrity check passed"

  pr-template-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PR template compliance
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            const requiredSections = ['## Reason', '## Behavior Diff'];
            const missing = requiredSections.filter(s => !body.includes(s));

            if (missing.length > 0) {
              core.setFailed(`PR is missing required sections: ${missing.join(', ')}`);
              return;
            }

            const reasonMatch = body.match(/## Reason\s*\n([^\n#]*)/);
            const reason = reasonMatch ? reasonMatch[1].trim().toLowerCase() : '';

            if (reason.includes('spec-change')) {
              const specPrMatch = body.match(/## Spec PR[^\n]*\n([^\n#]*)/);
              const specPr = specPrMatch ? specPrMatch[1].trim() : '';
              if (!specPr || specPr.startsWith('<!--')) {
                core.setFailed('Reason is spec-change but Spec PR is not filled.');
              }
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const componentFiles = files.filter(f => f.filename.includes('components/') || f.filename.includes('api/'));
            if (componentFiles.length > 0 && !reason.includes('spec-change') && !reason.includes('refactor')) {
              core.warning('This PR changes components/API client but Reason is not spec-change. If this changes external behavior, please update the spec first.');
            }
